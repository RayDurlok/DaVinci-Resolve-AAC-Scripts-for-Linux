name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check shell scripts
        run: |
          bash -n *.sh

      - name: Check Python scripts
        run: |
          python3 -m py_compile resolve_aac_*.py
