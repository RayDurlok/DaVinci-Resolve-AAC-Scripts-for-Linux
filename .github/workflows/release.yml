name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build script archive
        run: |
          mkdir -p resolve-aac-tools
          cp README.md LICENSE scripts/install_user_tools.sh resolve-aac-tools/
          cp scripts/resolve_aac_*.py resolve-aac-tools/
          cp scripts/resolve-with-aac-mediapool-watch.sh resolve-aac-tools/
          cp experiments/ffmpeg-patch/build_resolve_ffmpeg_aac.sh resolve-aac-tools/
          cp experiments/ffmpeg-patch/install_resolve_ffmpeg_aac.sh resolve-aac-tools/
          cp experiments/ffmpeg-patch/restore_resolve_ffmpeg_backup.sh resolve-aac-tools/
          cp experiments/ffmpeg-patch/resolve-with-aac.sh resolve-aac-tools/
          tar czf resolve-aac-tools-linux.tar.gz resolve-aac-tools

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: resolve-aac-tools-linux.tar.gz
          generate_release_notes: true
